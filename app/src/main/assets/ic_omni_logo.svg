<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Silver Brushed Metallic Gradients -->
    <linearGradient id="silver1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9" />
      <stop offset="30%" stop-color="#CBD5E1" />
      <stop offset="70%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>

    <linearGradient id="silver2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- Electric Neon Blue Gradients -->
    <linearGradient id="electricBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>

    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.1" />
    </radialGradient>

    <!-- Drop Shadows for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep charcoal canvas backplate (matches modern browser designs) -->
  <rect width="100%" height="100%" fill="#0D0E11" rx="48" />

  <!-- Core Logo Emblem Wrapper -->
  <g filter="url(#shadow)" transform="translate(0, 0)">
    <!-- Subtle blue backing glow -->
    <circle cx="256" cy="256" r="180" fill="url(#blueGlow)" filter="url(#glow)" />

    <!-- Overlapping swirl 1 (Outer Deep Blue Accent) -->
    <path d="M 256,76 C 355.4,76 436,156.6 436,256 C 436,290 426.6,321.7 410.2,348.8 C 400,320 378,240 330,190 C 290,148 240,126 186,110 C 208.5,88.4 230.8,76 256,76 Z" fill="url(#electricBlue)" opacity="0.9" />

    <!-- Overlapping swirl 2 (Silver Metal Band 1) -->
    <path d="M 256,76 C 220,76 186,85.6 156.6,102 C 210,130 260,180 290,230 C 330,298 332,380 300,422 C 378,396 436,321.7 436,256 C 436,156.6 355.4,76 256,76 Z" fill="url(#silver1)" />

    <!-- Overlapping swirl 3 (Inner Electric Blue Crescent) -->
    <path d="M 156.6,102 C 119.3,123 90,156.6 76,198 C 110,210 180,240 220,310 C 255,371 245,418 226,432 C 256,436 280,432 300,422 C 270,390 260,330 226,270 C 190,206 170,140 156.6,102 Z" fill="url(#electricBlue)" />

    <!-- Overlapping swirl 4 (Silver Metal Band 2 - Closing the "O") -->
    <path d="M 76,198 C 76,230 85.6,260 102,290 C 130,236 180,186 230,156 C 298,116 380,114 422,146 C 396,68 321.7,76 256,76 C 156.6,76 76,156.6 76,198 Z" fill="url(#silver2)" />

    <!-- Translucent Glassmorphic highlight bands for 3D realism -->
    <path d="M 256,76 C 355.4,76 436,156.6 436,256 C 436,270 434.5,283.7 431.6,297 C 410,240 360,160 280,116 C 272,102 264,88.7 256,76 Z" fill="#FFFFFF" opacity="0.25" />
    <path d="M 76,198 C 76,156.6 156.6,76 256,76 C 240,90 224,106 210,124 C 150,170 100,240 78.4,297 C 76.8,265 76,231 76,198 Z" fill="#FFFFFF" opacity="0.15" />

    <!-- Central visual circular hole defining the premium abstract letter 'O' -->
    <circle cx="256" cy="256" r="90" fill="#0D0E11" />
  </g>
</svg>

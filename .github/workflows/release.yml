name: 🚀 Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release Signed APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run Lint before release
        run: ./gradlew lintRelease --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename APK
        run: |
          VERSION=${{ github.ref_name }}
          mv app/build/outputs/apk/release/app-release*.apk \
             app/build/outputs/apk/release/omni-browser-${VERSION}.apk || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Omni Browser ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/omni-browser-*.apk
          body: |
            ## 📦 Omni Browser ${{ github.ref_name }}

            > ⚠️ This is an experimental release. See the [README](https://github.com/REBEL-ROOT/omni-browser#readme) disclaimer before installing.

            ### 📲 Installation
            1. Download `omni-browser-${{ github.ref_name }}.apk` below
            2. Enable **Install from unknown sources** on your device
            3. Install and enjoy!

            ### 📋 What's Changed
            See [CHANGELOG.md](https://github.com/REBEL-ROOT/omni-browser/blob/main/CHANGELOG.md) for full details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

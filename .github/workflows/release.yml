name: 🚀 Build & Release APK

on:
  push:
    tags:
      - 'v*'   # ONLY triggers on version tags like v1.3.0, v2.0.0-beta

jobs:
  release:
    name: Build and Release Signed APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compile check before release
        run: ./gradlew compileReleaseKotlin --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          # Tell Gradle to skip the local keystore — use CI secrets instead
          SKIP_SIGNING: "true"

      - name: Rename APK
        run: |
          VERSION=${{ github.ref_name }}
          find app/build/outputs/apk/release/ -name "*.apk" \
            -exec mv {} app/build/outputs/apk/release/omni-browser-${VERSION}.apk \;
          echo "APK renamed to omni-browser-${VERSION}.apk"
          ls -lh app/build/outputs/apk/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Omni Browser ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/omni-browser-*.apk
          body: |
            ## 📦 Omni Browser ${{ github.ref_name }}

            > ⚠️ **Experimental Release** — This software is in active development. See the [README disclaimer](https://github.com/REBEL-ROOT/omni-browser#readme) before installing.

            ### 📲 How to Install
            1. Download `omni-browser-${{ github.ref_name }}.apk` from the assets below
            2. On your Android device: **Settings → Install unknown apps** → enable for your file manager
            3. Open the APK and tap **Install**

            ### 📋 What's Changed
            See [CHANGELOG.md](https://github.com/REBEL-ROOT/omni-browser/blob/main/CHANGELOG.md) for full details.

            ### 📱 Requirements
            - Android 8.0+ (API 26)
            - `arm64-v8a` device architecture
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

Name: Omni Browser
Summary: Premium, private-first mobile web browser powered by GeckoView
Description: |-
  Omni Browser is a premium, privacy-first mobile web browser for Android built
  with Jetpack Compose and the Mozilla GeckoView engine.

  Features:
  * Built-in uBlock Origin content blocker for rapid and ad-free loading
  * Universal Text Copy to force-enable text selection on restricted pages
  * QR Code decoder and generator using 100% open-source ZXing libraries
  * Highly customizable settings: toggle bottom navigation bar, reader mode,
    preset Unsplash wallpapers, accent themes, and news feed
  * Secure and sandboxed storage with encrypted SQLCipher database

